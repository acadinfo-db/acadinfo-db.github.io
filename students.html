<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students — ACADALLY</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/motion.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="noise"></div>

<div class="layout">

    <!-- ── Sidebar ────────────────────────────── -->

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <div class="sidebar-dot"></div>
                <span>ACAD</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                Overview
                <span class="sidebar-link-count" id="nav-total"></span>
            </a>
            <a href="students.html" class="sidebar-link active">
                Students
                <span class="sidebar-link-count" id="nav-students"></span>
            </a>
            <a href="classes.html" class="sidebar-link">
                Classes
            </a>
            <a href="teachers.html" class="sidebar-link">
                Teachers
                <span class="sidebar-link-count" id="nav-teachers"></span>
            </a>
            <a href="search.html" class="sidebar-link">
                Search
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-meta">
                <div class="sidebar-meta-row">
                    <span class="sidebar-meta-label">STATUS</span>
                    <span class="sidebar-meta-val" style="color: var(--positive)">ONLINE</span>
                </div>
                <div class="sidebar-meta-row">
                    <span class="sidebar-meta-label">VERSION</span>
                    <span class="sidebar-meta-val">v4.0</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ── Main ───────────────────────────────── -->

    <main class="main">

        <header class="page-header reveal" style="--d:0">
            <div>
                <span class="micro">MODULE 02 — RECORDS</span>
                <h1>Students</h1>
            </div>
            <button class="filter-btn" id="export-btn" data-hover>↓ Export CSV</button>
        </header>

        <!-- School Switcher -->
        <div class="switcher-wrap reveal" style="--d:0" id="school-switcher"></div>

        <!-- Filters -->
        <div class="filter-bar reveal" style="--d:1">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" class="search-input" id="search"
                       placeholder="Search by name, username, phone, email…"
                       autocomplete="off" spellcheck="false">
            </div>
            <select class="filter-select" id="filter-class">
                <option value="">All classes</option>
            </select>
            <select class="filter-select" id="filter-section">
                <option value="">All sections</option>
            </select>
            <select class="filter-select" id="filter-gender">
                <option value="">All genders</option>
            </select>
        </div>

        <!-- Results info -->
        <div class="results-info" id="results-info"></div>

        <!-- Student table -->
        <div class="card">
            <div class="table-wrap" id="students-table"></div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

    </main>
</div>

<script src="js/data.js"></script>
<script src="js/motion.js"></script>
<script src="js/students.js"></script>
</body>
</html>
