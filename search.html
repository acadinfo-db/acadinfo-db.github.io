<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — ACADALLY</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/motion.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="noise"></div>

<div class="layout">

    <!-- ── Sidebar ────────────────────────────── -->

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <div class="sidebar-dot"></div>
                <span>ACAD</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                Overview
                <span class="sidebar-link-count" id="nav-total"></span>
            </a>
            <a href="students.html" class="sidebar-link">
                Students
                <span class="sidebar-link-count" id="nav-students"></span>
            </a>
            <a href="classes.html" class="sidebar-link">
                Classes
            </a>
            <a href="teachers.html" class="sidebar-link">
                Teachers
                <span class="sidebar-link-count" id="nav-teachers"></span>
            </a>
            <a href="search.html" class="sidebar-link active">
                Search
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-meta">
                <div class="sidebar-meta-row">
                    <span class="sidebar-meta-label">STATUS</span>
                    <span class="sidebar-meta-val" style="color: var(--positive)">ONLINE</span>
                </div>
                <div class="sidebar-meta-row">
                    <span class="sidebar-meta-label">VERSION</span>
                    <span class="sidebar-meta-val">v4.0</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ── Main ───────────────────────────────── -->

    <main class="main">

        <header class="page-header reveal" style="--d:0">
            <div>
                <span class="micro">MODULE 05 — INTELLIGENCE</span>
                <h1>Search</h1>
            </div>
        </header>

        <!-- School Switcher -->
        <div class="switcher-wrap reveal" style="--d:0" id="school-switcher"></div>

        <!-- Search hero -->
        <div class="search-hero reveal" style="--d:1">
            <p>Query across <span class="results-count" id="search-total">0</span> student records</p>
        </div>

        <!-- Big search -->
        <div class="search-big-wrap reveal" style="--d:2">
            <span class="search-big-icon">⌕</span>
            <input type="text" class="search-big-input" id="search-input"
                   placeholder="Name, username, phone number, email, class…"
                   autocomplete="off" spellcheck="false" autofocus>
        </div>

        <!-- Suggestions -->
        <div class="search-suggestions reveal" style="--d:3" id="suggestions"></div>

        <!-- Results info -->
        <div class="results-info" id="results-info" style="display:none"></div>

        <!-- Results -->
        <div id="results"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display:none"></div>

    </main>
</div>

<script src="js/data.js"></script>
<script src="js/motion.js"></script>
<script src="js/search.js"></script>
</body>
</html>
