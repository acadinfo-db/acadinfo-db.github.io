# ═══════════════════════════════════════════════════════════════
# acad_INFO — Automated Data Pipeline
#
# Two schedules:
#   • Every 6 hours: scrape profiles (skip discovery)
#   • 1st of each month: full run with discovery
#
# Secrets: SCRAPER_PAT (read access to acadinfo-db/acadally-scraper)
# ═══════════════════════════════════════════════════════════════

name: "🔄 Update Dashboard Data"

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
    # 1st of every month at 03:00 UTC — full discovery run
    - cron: '0 3 1 * *'

  workflow_dispatch:
    inputs:
      skip_discovery:
        description: 'Skip username discovery (faster, reuse existing list)'
        required: false
        default: true
        type: boolean
      workers:
        description: 'Concurrent workers'
        required: false
        default: '50'
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  DEFAULT_WORKERS: '50'

jobs:
  scrape-and-export:
    name: "Scrape → Export → Commit"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. CHECKOUT ──────────────────────────────────────

      - name: "📂 Checkout dashboard"
        uses: actions/checkout@v4
        with:
          path: dashboard

      - name: "🔒 Checkout scraper"
        uses: actions/checkout@v4
        with:
          repository: acadinfo-db/acadally-scraper
          token: ${{ secrets.SCRAPER_PAT }}
          path: scraper

      # ── 2. PYTHON ────────────────────────────────────────

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Install httpx"
        run: pip install --quiet httpx

      # ── 3. DETERMINE RUN MODE ───────────────────────────

      - name: "🧠 Determine run mode"
        id: mode
        run: |
          WORKERS="${{ github.event.inputs.workers || env.DEFAULT_WORKERS }}"
          echo "workers=${WORKERS}" >> $GITHUB_OUTPUT

          # Determine if we should skip discovery
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger — use the input
            SKIP="${{ github.event.inputs.skip_discovery }}"
          elif [ "${{ github.event.schedule }}" == "0 3 1 * *" ]; then
            # Monthly full run
            SKIP="false"
          else
            # Regular 6-hourly run — skip discovery
            SKIP="true"
          fi

          echo "skip_discovery=${SKIP}" >> $GITHUB_OUTPUT

          if [ "$SKIP" == "true" ]; then
            echo "Mode: QUICK UPDATE (skip discovery, scrape only)"
          else
            echo "Mode: FULL RUN (discovery + scrape)"
          fi
          echo "Workers: ${WORKERS}"

      # ── 4. PREPARE ──────────────────────────────────────

      - name: "📁 Prepare output directory"
        run: |
          mkdir -p scraper/output

          if [ -f "scraper/output/cracked_teachers.txt" ]; then
            echo "✓ cracked_teachers.txt found"
          else
            echo "⚠ cracked_teachers.txt missing — creating empty"
            touch scraper/output/cracked_teachers.txt
          fi

          if [ -f "scraper/output/teacher_accounts_explored.json" ]; then
            echo "✓ teacher_accounts_explored.json found"
          else
            echo "⚠ teacher_accounts_explored.json missing — creating empty"
            echo "[]" > scraper/output/teacher_accounts_explored.json
          fi

      # ── 5. RESTORE PREVIOUS USERNAME LIST (for skip mode)

      - name: "📋 Restore previous username list"
        if: steps.mode.outputs.skip_discovery == 'true'
        run: |
          # Try to get the previous valid_usernames.txt from
          # the last successful scraper run (cached as artifact)
          # If not available, we MUST run discovery
          if [ -f "scraper/output/valid_usernames.txt" ]; then
            COUNT=$(wc -l < scraper/output/valid_usernames.txt)
            echo "✓ Found existing username list: ${COUNT} entries"
          else
            echo "⚠ No existing username list found"
            echo "Falling back to full discovery..."
            echo "skip_discovery=false" >> $GITHUB_OUTPUT
          fi

      # ── 6. CACHE USERNAME LIST ──────────────────────────

      - name: "💾 Restore username cache"
        if: steps.mode.outputs.skip_discovery == 'true'
        uses: actions/cache@v4
        with:
          path: scraper/output/valid_usernames.txt
          key: valid-usernames-${{ runner.os }}
          restore-keys: |
            valid-usernames-

      - name: "🔎 Check if username list exists after cache restore"
        id: check_list
        run: |
          if [ -f "scraper/output/valid_usernames.txt" ]; then
            COUNT=$(wc -l < scraper/output/valid_usernames.txt)
            if [ "$COUNT" -gt 50 ]; then
              echo "has_list=true" >> $GITHUB_OUTPUT
              echo "✓ Username list: ${COUNT} entries"
            else
              echo "has_list=false" >> $GITHUB_OUTPUT
              echo "⚠ List too small (${COUNT}), need discovery"
            fi
          else
            echo "has_list=false" >> $GITHUB_OUTPUT
            echo "⚠ No cached list, need discovery"
          fi

      # ── 7. PHASE 1: DISCOVERY ───────────────────────────

      - name: "🔍 Phase 1: Discover usernames"
        if: steps.mode.outputs.skip_discovery == 'false' || steps.check_list.outputs.has_list == 'false'
        working-directory: scraper
        env:
          SCRAPER_OUTPUT_DIR: output
          DISCOVERY_WORKERS: ${{ steps.mode.outputs.workers }}
          REQUEST_TIMEOUT: "20"
        run: |
          echo "═══ Phase 1: Username Discovery ═══"
          python discover.py --workers ${DISCOVERY_WORKERS}

          if [ -f "output/valid_usernames.txt" ]; then
            COUNT=$(wc -l < output/valid_usernames.txt)
            echo "✓ Discovered ${COUNT} usernames"
          else
            echo "✗ Discovery failed"
            exit 1
          fi

      - name: "💾 Cache username list"
        if: steps.mode.outputs.skip_discovery == 'false' || steps.check_list.outputs.has_list == 'false'
        uses: actions/cache/save@v4
        with:
          path: scraper/output/valid_usernames.txt
          key: valid-usernames-${{ runner.os }}-${{ github.run_id }}

      # ── 8. PHASE 2: SCRAPING ────────────────────────────

      - name: "⚡ Phase 2: Scrape profiles"
        working-directory: scraper
        env:
          SCRAPER_OUTPUT_DIR: output
          SCRAPE_WORKERS: ${{ steps.mode.outputs.workers }}
          SCRAPE_DELAY: "0.05"
          REQUEST_TIMEOUT: "20"
        run: |
          echo "═══ Phase 2: Profile Scraping ═══"
          python main.py --workers ${SCRAPE_WORKERS} --delay ${SCRAPE_DELAY}

          if [ -f "output/students.db" ]; then
            ROWS=$(python3 -c "
          import sqlite3
          c = sqlite3.connect('output/students.db')
          print(c.execute('SELECT COUNT(*) FROM students').fetchone()[0])
          c.close()
          ")
            echo "✓ ${ROWS} students scraped"
          else
            echo "✗ Scraping failed"
            exit 1
          fi

      # ── 9. EXPORT ───────────────────────────────────────

      - name: "📊 Export to JSON"
        env:
          DB_PATH: ${{ github.workspace }}/scraper/output/students.db
          TEACHERS_PATH: ${{ github.workspace }}/scraper/output/cracked_teachers.txt
          EXPLORED_PATH: ${{ github.workspace }}/scraper/output/teacher_accounts_explored.json
          OUTPUT_DIR: ${{ github.workspace }}/dashboard/data
        run: |
          python dashboard/tools/export_data.py

      # ── 10. VALIDATE ────────────────────────────────────

      - name: "✅ Validate"
        run: |
          python3 -c "
          import json, sys
          s = json.load(open('dashboard/data/students.json'))
          m = json.load(open('dashboard/data/meta.json'))
          t = json.load(open('dashboard/data/teachers.json'))
          print(f'Students: {len(s):,}  Teachers: {len(t)}  Sections: {m.get(\"total_sections\",\"?\")}')
          print(f'Gems: {m.get(\"gems_total\",0):,}  Coins: {m.get(\"coins_total\",0):,}')
          if len(s) < 100:
              print('ERROR: Too few students')
              sys.exit(1)
          print('✓ Validation passed')
          "

      # ── 11. DIFF + COMMIT ───────────────────────────────

      - name: "🔎 Check changes"
        id: diff
        working-directory: dashboard
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in data."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changed:"
            git diff --stat data/
          fi

      - name: "💾 Commit and push"
        # Always commit — even if data looks "unchanged", timestamps differ
        working-directory: dashboard
        run: |
          git config user.name "acad_INFO bot"
          git config user.email "noreply@acadinfo-db.github.io"

          git add -f data/

          # Check if there's actually anything staged
          if git diff --cached --quiet; then
            echo "Nothing to commit (files truly identical)"
            exit 0
          fi

          STATS=$(python3 -c "
          import json
          m = json.load(open('data/meta.json'))
          s = len(json.load(open('data/students.json')))
          t = len(json.load(open('data/teachers.json')))
          g = m.get('gems_total', 0)
          c = m.get('coins_total', 0)
          print(f'{s} students · {t} teachers · {g:,}g · {c:,}c')
          ")

          MODE="quick"
          if [ "${{ steps.mode.outputs.skip_discovery }}" == "false" ]; then
            MODE="full"
          fi

          DATE=$(date -u +"%Y-%m-%d %H:%M")
          git commit -m "data(${MODE}): ${STATS} · ${DATE} UTC"
          git push

          echo "✓ Committed"

      # ── 12. SUMMARY ─────────────────────────────────────

      - name: "📋 Job summary"
        if: always()
        run: |
          {
            echo "## 📊 acad_INFO Pipeline"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Run | $(date -u +'%Y-%m-%d %H:%M UTC') |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Mode | ${{ steps.mode.outputs.skip_discovery == 'true' && 'Quick (skip discovery)' || 'Full (with discovery)' }} |"
            echo "| Workers | ${{ steps.mode.outputs.workers }} |"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          if [ -f "dashboard/data/meta.json" ]; then
            python3 -c "
          import json
          m = json.load(open('dashboard/data/meta.json'))
          s = json.load(open('dashboard/data/students.json'))
          t = json.load(open('dashboard/data/teachers.json'))
          print('| Metric | Value |')
          print('|--------|------:|')
          print(f'| Students | **{len(s):,}** |')
          print(f'| Teachers | **{len(t)}** |')
          print(f'| Gems | {m.get(\"gems_total\",0):,} |')
          print(f'| Coins | {m.get(\"coins_total\",0):,} |')
          print(f'| Sections | {m.get(\"total_sections\",\"?\")} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.diff.outputs.changed }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Data updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ No data changes." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 13. CLEANUP ─────────────────────────────────────

      - name: "🧹 Cleanup"
        if: always()
        run: rm -rf scraper
