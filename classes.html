<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes — acad_INFO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/motion.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
</head>
<body>
<div class="noise"></div>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand"><img src="assets/logo.svg" alt="acad_INFO logo" style="height: 24px; width: auto;"></a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">Overview <span class="sidebar-link-count" id="nav-total"></span></a>
            <a href="students.html" class="sidebar-link">Students <span class="sidebar-link-count" id="nav-students"></span></a>
            <a href="classes.html" class="sidebar-link active">Classes <span class="sidebar-link-count" id="nav-classes"></span></a>
            <a href="teachers.html" class="sidebar-link">Teachers <span class="sidebar-link-count" id="nav-teachers"></span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-meta">
                <div class="sidebar-meta-row"><span class="sidebar-meta-label">STATUS</span><span class="sidebar-meta-val" style="color:var(--positive)">ONLINE</span></div>
                <div class="sidebar-meta-row"><span class="sidebar-meta-label">VERSION</span><span class="sidebar-meta-val">v4.3</span></div>
            </div>
        </div>
    </aside>
    <main class="main">
        <header class="page-header reveal" style="--d:0">
            <div><span class="micro">MODULE 03 — SECTIONS</span><h1>Classes</h1></div>
        </header>
        <div class="switcher-wrap reveal" style="--d:0" id="school-switcher"></div>
        <div class="stat-row" id="class-stats"></div>
        <div class="card reveal" style="--d:1">
            <h3 class="card-title">Students per class</h3>
            <div class="bar-rows" id="class-chart"></div>
        </div>
        <div class="results-info" id="sections-info" style="margin-bottom: var(--s2)"></div>
        <div class="filters-row" style="margin-bottom: var(--s3)">
            <select id="sort-sections" class="filter-select">
                <option value="name">Sort by: Section Name</option>
                <option value="-score">Net Score (High &rarr; Low)</option>
                <option value="-gems">Total Gems (High &rarr; Low)</option>
                <option value="-coins">Total Coins (High &rarr; Low)</option>
                <option value="-students">Students (High &rarr; Low)</option>
            </select>
        </div>
        <div id="sections-container"></div>
    </main>
</div>
<script src="js/data.js"></script>
<script src="js/motion.js"></script>
<script src="js/classes.js"></script>
</body>
</html>
